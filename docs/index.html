<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radix Sort — Interactive Demo</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>

<header>
  <h1>Radix Sort — Interactive Demo</h1>
  <p>Step through the reduce-then-scan algorithm with adjustable RADIX, partition size, and key count.</p>
  <div class="links">
    <a href="https://github.com/jaesung-cs/vulkan_radix_sort">GitHub</a>
  </div>
</header>

<main>

  <div class="controls">
    <div class="ctrl">
      <label>RADIX</label>
      <select id="radix">
        <option value="4" selected>4  (2 bits/pass)</option>
        <option value="8">8  (3 bits/pass)</option>
        <option value="16">16 (4 bits/pass)</option>
      </select>
    </div>
    <div class="ctrl">
      <label>Keys (N) &nbsp;<span class="val" id="nval">16</span></label>
      <input type="range" id="nkeys" min="4" max="32" value="32" step="1">
    </div>
    <div class="ctrl">
      <label>Partition size &nbsp;<span class="val" id="psval">4</span></label>
      <input type="range" id="psize" min="2" max="16" value="6" step="1">
    </div>
    <div class="ctrl">
      <label>Seed</label>
      <input type="number" id="seed" value="42" min="0" max="9999" style="width:72px">
    </div>
  </div>

  <div class="tabs" id="tabs">
    <button class="tab active" data-step="input">Input</button>
    <button class="tab" data-step="partition">Partition</button>
    <button class="tab" data-step="upsweep">Upsweep</button>
    <button class="tab" data-step="spine">Spine</button>
    <button class="tab" data-step="local-sort">Local Sort</button>
    <button class="tab" data-step="scatter">Scatter</button>
    <button class="tab" data-step="output">Output</button>
  </div>

  <div id="app"></div>

</main>

<script>
// ── Seeded RNG (xorshift32) ─────────────────────────────────────────────────
function rng(seed) {
  let s = (seed >>> 0) || 1;
  return () => { s ^= s << 13; s ^= s >> 17; s ^= s << 5; return s >>> 0; };
}

// ── Core algorithm ──────────────────────────────────────────────────────────
function digit(key, pass, log2R) {
  return (key >>> (pass * log2R)) & ((1 << log2R) - 1);
}

function runPass(keys, pass, log2R, PS) {
  const R = 1 << log2R, N = keys.length, P = Math.ceil(N / PS);

  // Upsweep
  const pH = Array.from({length: P}, () => new Int32Array(R));
  const gH = new Int32Array(R);
  for (let p = 0; p < P; p++)
    for (let i = p * PS; i < Math.min((p+1)*PS, N); i++) {
      const d = digit(keys[i], pass, log2R);
      pH[p][d]++; gH[d]++;
    }

  // Spine — global exclusive prefix sum
  const gPS = new Int32Array(R);
  for (let d = 1; d < R; d++) gPS[d] = gPS[d-1] + gH[d-1];

  // Spine — per-partition exclusive prefix sum per digit column
  const pPS = Array.from({length: P}, () => new Int32Array(R));
  for (let d = 0; d < R; d++) {
    let acc = 0;
    for (let p = 0; p < P; p++) { pPS[p][d] = acc; acc += pH[p][d]; }
  }

  // Downsweep — local prefix sum within each partition (where each digit group starts in smem)
  const localPrefix = Array.from({length: P}, (_, p) => {
    const prefix = new Int32Array(R);
    let acc = 0;
    for (let d = 0; d < R; d++) { prefix[d] = acc; acc += pH[p][d]; }
    return prefix;
  });

  // Downsweep — localOffsets: rank within digit group (before adding localPrefix)
  // Mirrors shader: localOffsets[i] = waveOffset, before += localHistogram[...]
  const localOffsets = new Array(P * PS);
  for (let p = 0; p < P; p++) {
    const lc = new Int32Array(R);
    for (let i = p * PS; i < (p+1) * PS; i++) {
      const d = digit(keys[i], pass, log2R);
      localOffsets[i] = lc[d];
      lc[d]++;
    }
  }

  // Downsweep — local sort within each partition, tracking original indices
  const localSorted = new Array(P * PS);
  const localSortedIdx = new Array(P * PS);
  for (let p = 0; p < P; p++) {
    const slice = Array.from({length: PS}, (_, j) => ({key: keys[p*PS+j], idx: p*PS+j}));
    slice.sort((a, b) => digit(a.key, pass, log2R) - digit(b.key, pass, log2R));
    for (let j = 0; j < PS; j++) {
      localSorted[p * PS + j]    = slice[j].key;
      localSortedIdx[p * PS + j] = slice[j].idx;
    }
  }

  // Downsweep — scatter from locally-sorted order to global
  const out = new Array(P * PS);
  const outIdx = new Array(P * PS);
  const rows = [];
  for (let p = 0; p < P; p++) {
    const lc = new Int32Array(R);
    for (let j = 0; j < PS; j++) {
      const li = p * PS + j;
      const key = localSorted[li];
      const d = digit(key, pass, log2R);
      const dst = gPS[d] + pPS[p][d] + lc[d];
      out[dst] = key;
      outIdx[dst] = localSortedIdx[li];
      rows.push({localPos: li, to: dst, key, d, g: gPS[d], pp: pPS[p][d], lr: lc[d], p});
      lc[d]++;
    }
  }

  return {pH, gH, gPS, pPS, localPrefix, localOffsets, localSortedIdx, localSorted, outIdx, out, rows};
}

function sort(keys, log2R, numPasses, PS) {
  const passes = []; let cur = [...keys];
  for (let p = 0; p < numPasses; p++) {
    const r = runPass(cur, p, log2R, PS);
    passes.push({input: [...cur], ...r});
    cur = r.out;
  }
  return {passes, sorted: cur};
}

// ── Colors ──────────────────────────────────────────────────────────────────
const dColor = (d, R) => { const l = R > 1 ? Math.round(40 + d * 50 / (R-1)) : 65; return `hsl(0,0%,${l}%)`; };
const dBg    = (d, R) => { const l = R > 1 ? Math.round(8  + d * 22 / (R-1)) : 18; return `hsl(0,0%,${l}%)`; };

// ── DOM helpers ─────────────────────────────────────────────────────────────
function mk(tag, cls, html) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html != null) e.innerHTML = html;
  return e;
}
function ap(parent, ...children) {
  children.forEach(c => parent.appendChild(c));
  return parent;
}

// ── Render: key array ───────────────────────────────────────────────────────
function keyRow(keys, pass, log2R, R, showDigit = true, PS = 0, sublabels = null, realN = keys.length, origIndices = null, partitions = null) {
  const row = mk('div', 'key-row');
  keys.forEach((k, i) => {
    const isPad = i >= realN;
    const d = digit(k, pass, log2R);
    const box = mk('div', isPad ? 'key-box pad' : 'key-box');
    box.style.cssText = `background:${dBg(d,R)};border-color:${dColor(d,R)}`;
    box.dataset.keyId = origIndices ? origIndices[i] : i;
    box.dataset.digit = d;
    if (partitions) box.dataset.partition = partitions[i];
    const sub = isPad ? null : (sublabels ? sublabels[i] : (showDigit ? `d=${d}` : null));
    box.innerHTML = `<span class="kv">${k}</span>` +
      (sub ? `<span class="kd">${sub}</span>` : '');
    row.appendChild(box);
  });
  return row;
}

// ── Render: keys as partition rows ──────────────────────────────────────────
function keyGrid(keys, pass, log2R, R, showDigit, PS, realN = keys.length, sublabels = null, origIndices = null) {
  const grid = mk('div', 'key-grid');
  const P = Math.ceil(keys.length / PS);
  for (let p = 0; p < P; p++) {
    const row = mk('div', 'key-grid-row');
    const lbl = mk('span', 'key-grid-lbl'); lbl.textContent = `P${p}`;
    row.appendChild(lbl);
    for (let i = p * PS; i < (p+1) * PS; i++) {
      const isPad = i >= realN;
      const d = digit(keys[i], pass, log2R);
      const box = mk('div', isPad ? 'key-box pad' : 'key-box');
      box.style.cssText = `background:${dBg(d,R)};border-color:${dColor(d,R)}`;
      box.dataset.keyId = origIndices ? origIndices[i] : i;
      box.dataset.digit = d;
      box.dataset.partition = p;
      const sub = sublabels ? sublabels[i] : (showDigit && !isPad ? `d=${d}` : null);
      box.innerHTML = `<span class="kv">${keys[i]}</span>` +
        (sub != null ? `<span class="kd">${sub}</span>` : '');
      row.appendChild(box);
    }
    grid.appendChild(row);
  }
  return grid;
}

// ── Render: histogram table (RADIX ≤ 16) ────────────────────────────────────
function histTable(data, R, rowLabels) {
  const t = mk('table', 'htable');
  // header
  const hr = mk('tr');
  ap(hr, mk('th', null, ''));
  for (let d = 0; d < R; d++) {
    const th = mk('th'); th.style.color = dColor(d, R); th.textContent = `d=${d}`;
    th.dataset.digit = d;
    hr.appendChild(th);
  }
  ap(t, ap(mk('thead'), hr));
  // rows
  const tb = mk('tbody');
  data.forEach((row, i) => {
    const tr = mk('tr');
    ap(tr, mk('td', 'lbl', rowLabels[i]));
    for (let d = 0; d < R; d++) {
      const v = row[d];
      const td = mk('td');
      td.textContent = v;
      td.dataset.digit = d;
      td.dataset.partition = i;
      if (v > 0) td.style.cssText = `background:${dBg(d,R)};color:${dColor(d,R)}`;
      else td.style.color = 'var(--border)';
      tr.appendChild(td);
    }
    tb.appendChild(tr);
  });
  ap(t, tb);
  return t;
}

// ── Render: single row ───────────────────────────────────────────────────────
function singleRow(vals, R, label) {
  const t = mk('table', 'htable');
  const hr = mk('tr');
  ap(hr, mk('th', null, ''));
  for (let d = 0; d < R; d++) {
    const th = mk('th'); th.style.color = dColor(d, R); th.textContent = `d=${d}`;
    th.dataset.digit = d;
    hr.appendChild(th);
  }
  ap(t, ap(mk('thead'), hr));
  const tr = mk('tr');
  ap(tr, mk('td', 'lbl', label));
  for (let d = 0; d < R; d++) {
    const td = mk('td');
    td.textContent = vals[d];
    td.dataset.digit = d;
    td.style.cssText = `background:${dBg(d,R)};color:${dColor(d,R)}`;
    tr.appendChild(td);
  }
  ap(t, ap(mk('tbody'), tr));
  return t;
}

// ── Render: scatter detail table ────────────────────────────────────────────
function scatterTable(rows, R) {
  const t = mk('table', 'stable');
  const hr = mk('tr');
  ['local pos','key','digit','global\noffset','partition\noffset','local\nrank','→ dst'].forEach(h => ap(hr, mk('th',null,h)));
  ap(t, ap(mk('thead'), hr));
  const tb = mk('tbody');
  rows.forEach(r => {
    const tr = mk('tr');
    const c = dColor(r.d, R);
    [r.localPos, r.key, r.d, r.g, r.pp, r.lr, r.to].forEach((v, ci) => {
      const td = mk('td'); td.textContent = v;
      if (ci === 2) td.style.color = c;
      if (ci === 6) { td.style.color = 'var(--accent2)'; td.style.fontWeight = 'bold'; }
      tr.appendChild(td);
    });
    tb.appendChild(tr);
  });
  ap(t, tb);
  return t;
}

// ── Main render ─────────────────────────────────────────────────────────────
function render() {
  const R      = parseInt(document.getElementById('radix').value);
  const log2R  = Math.round(Math.log2(R));
  const N      = parseInt(document.getElementById('nkeys').value);
  const PS     = Math.min(parseInt(document.getElementById('psize').value), N);
  const seed   = parseInt(document.getElementById('seed').value) || 42;

  document.getElementById('nval').textContent  = N;
  document.getElementById('psval').textContent = PS;

  const totalBits = log2R;
  const maxKey    = totalBits >= 32 ? 0xFFFFFFFF : (1 << totalBits) - 1;
  const gen       = rng(seed);
  const keys       = Array.from({length: N}, () => gen() % (maxKey + 1));
  const P          = Math.ceil(N / PS);
  const padVal     = R - 1;
  const paddedKeys = [...keys, ...Array(P * PS - N).fill(padVal)];

  const rowLabels  = Array.from({length: P}, (_, i) => `P${i}`);
  const {passes, sorted} = sort(paddedKeys, log2R, 1, PS);

  const app = document.getElementById('app');
  app.innerHTML = '';

  // Info line
  const info = mk('p');
  info.style.cssText = 'color:var(--muted);font-family:monospace;font-size:.88rem;margin:.5rem 0 1rem';
  info.textContent =
    `RADIX=${R}  log₂(RADIX)=${log2R}  N=${N}  partitions=${P}  partition_size=${PS}  key range [0, ${maxKey}]`;
  app.appendChild(info);

  const {input, pH, gH, gPS, pPS, localPrefix, localOffsets, localSortedIdx, localSorted, outIdx, out, rows} = passes[0];
  const outPart = outIdx.map(id => Math.floor(id / PS));

  // ── Input ─────────────────────────────────────────────────────────────────
  const sInput = mk('div'); sInput.dataset.step = 'input';
  ap(sInput, mk('h3', null, 'Input Keys'));
  sInput.appendChild(keyRow(keys, 0, log2R, R, false));
  app.appendChild(sInput);

  // ── Partition ─────────────────────────────────────────────────────────────
  const sPartition = mk('div'); sPartition.dataset.step = 'partition';
  ap(sPartition, mk('h3', null, 'Input Keys'));
  sPartition.appendChild(keyRow(keys, 0, log2R, R, false));
  ap(sPartition, mk('h3', null, 'Keys by Partition'));
  ap(sPartition, mk('div', 'note', `N=${N} keys split into ${P} partitions of ${PS}`));
  sPartition.appendChild(keyGrid(input, 0, log2R, R, true, PS, N));
  app.appendChild(sPartition);

  // ── Upsweep ───────────────────────────────────────────────────────────────
  const sUp = mk('div'); sUp.dataset.step = 'upsweep';
  ap(sUp, mk('h3', null, 'Keys by Partition'));
  sUp.appendChild(keyGrid(input, 0, log2R, R, true, PS, N));
  ap(sUp, mk('h3', null, 'Stage 1 · Upsweep'));
  ap(sUp, mk('div', 'note', 'partitionHistogram[P][d] — digit count per partition:'));
  sUp.appendChild(histTable(pH, R, rowLabels));
  ap(sUp, mk('div', 'note', 'globalHistogram[d] — total count across all partitions:'));
  sUp.appendChild(singleRow(gH, R, 'global'));
  app.appendChild(sUp);

  // ── Spine ─────────────────────────────────────────────────────────────────
  const sSpine = mk('div'); sSpine.dataset.step = 'spine';
  ap(sSpine, mk('h3', null, 'Keys by Partition'));
  sSpine.appendChild(keyGrid(input, 0, log2R, R, true, PS, N));
  ap(sSpine, mk('h3', null, 'Upsweep result — partitionHistogram (input)'));
  ap(sSpine, mk('div', 'note', 'partitionHistogram[P][d] — raw counts:'));
  sSpine.appendChild(histTable(pH, R, rowLabels));
  ap(sSpine, mk('h3', null, 'Stage 2 · Spine'));
  ap(sSpine, mk('div', 'note', 'globalHistogram[d] — total count per digit:'));
  sSpine.appendChild(singleRow(gH, R, 'count'));
  ap(sSpine, mk('div', 'note', 'globalOffset[d] — exclusive prefix sum of counts (output start per digit):'));
  sSpine.appendChild(singleRow(gPS, R, 'offset'));
  ap(sSpine, mk('div', 'note', 'partitionHistogram[P][d] after spine — exclusive prefix sum per digit column:'));
  sSpine.appendChild(histTable(pPS, R, rowLabels));
  app.appendChild(sSpine);

  // ── Local Sort ────────────────────────────────────────────────────────────
  const sLocalSort = mk('div'); sLocalSort.dataset.step = 'local-sort';
  ap(sLocalSort, mk('h3', null, 'Stage 3 · Downsweep — Step 1 · Local Sort'));
  ap(sLocalSort, mk('p', 'desc',
    'Each partition independently sorts its keys by digit into shared memory (SMEM). ' +
    'Threads use wave ballot to assign each key a <code>localRank</code> — its position ' +
    'among all keys in the same partition with the same digit. ' +
    'Separately, an exclusive prefix sum over the digit counts gives <code>localPrefix[p][d]</code>: ' +
    'where digit group <code>d</code> starts inside the locally sorted array. ' +
    'Each key is written to <code>localPrefix[p][d] + localRank</code> in SMEM.'));
  ap(sLocalSort, mk('div', 'note', 'Input — keys by partition (subscript = localRank within digit group):'));
  sLocalSort.appendChild(keyGrid(input, 0, log2R, R, true, PS, N, localOffsets, null));
  ap(sLocalSort, mk('div', 'note', 'localPrefix[P][d] — digit group start offsets within each partition:'));
  sLocalSort.appendChild(histTable(localPrefix, R, rowLabels));
  const localSortedRanks = Array.from({length: P * PS}, (_, i) => {
    const p = Math.floor(i / PS), j = i % PS;
    const d = digit(localSorted[i], 0, log2R);
    return j - localPrefix[p][d];
  });
  ap(sLocalSort, mk('div', 'note', 'Result — keys sorted by digit within each partition (subscript = localRank):'));
  sLocalSort.appendChild(keyGrid(localSorted, 0, log2R, R, true, PS, N, localSortedRanks, localSortedIdx));
  app.appendChild(sLocalSort);

  // ── Scatter ───────────────────────────────────────────────────────────────
  const sScatter = mk('div'); sScatter.dataset.step = 'scatter';
  ap(sScatter, mk('h3', null, 'Stage 3 · Downsweep — Step 2 · Scatter'));
  ap(sScatter, mk('p', 'desc',
    'Each key is written to its final position in the output buffer. ' +
    'The destination is computed from three addends: ' +
    '<code>dst = globalOffset[d] + partitionOffset[p][d] + localRank</code>. ' +
    '<code>globalOffset[d]</code> is where digit <code>d</code> starts in the output (from the global histogram prefix sum). ' +
    '<code>partitionOffset[p][d]</code> is how many keys with digit <code>d</code> came from partitions before <code>p</code> (spine result). ' +
    '<code>localRank</code> is the key\'s rank within its digit group inside partition <code>p</code> (local sort result). ' +
    'Keys are read sequentially from the locally sorted SMEM — coalesced reads — and written to scattered destinations.'));
  ap(sScatter, mk('div', 'note', 'Input — locally sorted keys (subscript = localRank within digit group):'));
  sScatter.appendChild(keyGrid(localSorted, 0, log2R, R, true, PS, N, localSortedRanks, localSortedIdx));
  ap(sScatter, mk('div', 'note', 'globalOffset[d] — output buffer start per digit (from global histogram):'));
  sScatter.appendChild(singleRow(gPS, R, 'offset'));
  ap(sScatter, mk('div', 'note', 'partitionOffset[P][d] — per-partition offset per digit (spine result):'));
  sScatter.appendChild(histTable(pPS, R, rowLabels));
  ap(sScatter, mk('div', 'note', 'Result — keys scattered to final positions (dst = globalOffset[d] + partitionOffset[p][d] + localRank):'));
  sScatter.appendChild(keyRow(out, 0, log2R, R, false, 0, null, N, outIdx, outPart));
  const det = mk('details');
  ap(det, mk('summary', null, 'Show scatter detail table'));
  det.appendChild(scatterTable(rows, R));
  sScatter.appendChild(det);
  app.appendChild(sScatter);

  // ── Output ────────────────────────────────────────────────────────────────
  const sOut = mk('div'); sOut.dataset.step = 'output';
  ap(sOut, mk('h3', null, 'Input Keys'));
  sOut.appendChild(keyRow(keys, 0, log2R, R, false));
  ap(sOut, mk('h3', null, 'Sorted Output'));
  sOut.appendChild(keyRow(sorted.slice(0, N), 0, log2R, R, false, 0, null, N, outIdx.slice(0, N), outPart.slice(0, N)));
  app.appendChild(sOut);

  showStep(activeStep);
}

// ── Hover highlighting ───────────────────────────────────────────────────────
const app = document.getElementById('app');
let _clearHL = null;
function clearHL() {
  app.classList.remove('hovering');
  app.querySelectorAll('.hl, .hl-digit, .hl-cell')
     .forEach(el => el.classList.remove('hl', 'hl-digit', 'hl-cell'));
}
app.addEventListener('mouseover', e => {
  const box = e.target.closest('.key-box');
  if (!box || box.dataset.keyId == null) return;
  if (_clearHL) { clearTimeout(_clearHL); _clearHL = null; }
  const keyId = box.dataset.keyId;
  const digit  = box.dataset.digit;
  const part   = box.dataset.partition;
  app.classList.add('hovering');
  app.querySelectorAll('.key-box').forEach(b =>
    b.classList.toggle('hl', b.dataset.keyId === keyId));
  app.querySelectorAll('[data-digit]').forEach(c => {
    const dm = c.dataset.digit === digit;
    const hasPart = c.dataset.partition !== undefined;
    const pm = hasPart && c.dataset.partition === part;
    c.classList.toggle('hl-cell',  dm && (!hasPart || pm));
    c.classList.toggle('hl-digit', dm && hasPart && !pm);
  });
});
app.addEventListener('mouseout', e => {
  if (!e.target.closest('.key-box')) return;
  _clearHL = setTimeout(clearHL, 80);
});

// ── Tab navigation ───────────────────────────────────────────────────────────
let activeStep = 'input';
function showStep(step) {
  activeStep = step;
  document.querySelectorAll('.tab').forEach(b =>
    b.classList.toggle('active', b.dataset.step === step));
  document.querySelectorAll('#app > [data-step]').forEach(el =>
    el.style.display = el.dataset.step === step ? '' : 'none');
}
document.querySelectorAll('.tab').forEach(b =>
  b.addEventListener('click', () => showStep(b.dataset.step)));

// ── Wire controls ────────────────────────────────────────────────────────────
['radix','nkeys','psize','seed'].forEach(id => {
  document.getElementById(id).addEventListener('input',  render);
  document.getElementById(id).addEventListener('change', render);
});
render();
</script>

</body>
</html>
